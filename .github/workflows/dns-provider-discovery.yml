name: DNS Provider Discovery

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/dns-provider-discovery-trigger

permissions:
  contents: read
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Resolve authoritative DNS provider
        id: dns
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v dig >/dev/null 2>&1; then
            sudo apt-get update -qq >/dev/null 2>&1
            sudo apt-get install -y -qq dnsutils >/dev/null 2>&1
          fi

          nameservers="$(dig +short NS mobiuscommand.live | sort | paste -sd ', ' -)"
          soa="$(dig +short SOA mobiuscommand.live | head -n 1)"

          [[ -n "${nameservers}" ]] || nameservers='NONE_FOUND'
          [[ -n "${soa}" ]] || soa='NONE_FOUND'

          echo "nameservers=${nameservers}" >> "${GITHUB_OUTPUT}"
          echo "soa=${soa}" >> "${GITHUB_OUTPUT}"

      - name: Publish DNS provider report
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NAMESERVERS: ${{ steps.dns.outputs.nameservers }}
          SOA: ${{ steps.dns.outputs.soa }}
        run: |
          set -euo pipefail

          body=$(cat <<EOF
          ## Authoritative DNS discovery

          - Nameservers: **${NAMESERVERS}**
          - SOA: **${SOA}**

          Commit: ${GITHUB_SHA}

          Read-only public DNS lookup. No DNS, registrar, email, Supabase, deployment, or production settings were changed.
          EOF
          )

          payload="$(jq -n --arg title 'DNS Provider Discovery Report' --arg body "${body}" '{title:$title,body:$body}')"
          code="$(curl --silent --show-error --output /tmp/issue.json --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" \
            --data "${payload}")"

          [[ "${code}" == "201" ]]
          rm -f /tmp/issue.json
